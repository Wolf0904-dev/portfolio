<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin - Luxe & Éclat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style-admin.css">
</head>
<body>
    <div class="sidebar">
        <a href="index.html" class="sidebar-logo">💎 Admin Luxe</a>
        <hr>
        <a onclick="app.showDash()" class="nav-link"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a onclick="app.showCRUD('users')" class="nav-link"><i class="fas fa-users"></i> Utilisateurs</a>
        <a onclick="app.showCRUD('produits')" class="nav-link"><i class="fas fa-ring"></i> Produits</a>
        <a onclick="app.showCRUD('orders')" class="nav-link"><i class="fas fa-shopping-cart"></i> Commandes</a>
        <a onclick="app.showCRUD('categories')" class="nav-link"><i class="fas fa-tags"></i> Catégories</a>
        <a href="index.html" class="nav-link text-danger mt-5"><i class="fas fa-power-off"></i> Déconnexion</a>
    </div>

    <div class="content" id="main"></div>

    <div class="modal fade" id="crudModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Édition</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="crudForm"></form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fermer</button>
                    <button type="submit" form="crudForm" class="btn btn-primary">Enregistrer</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="admin.js"></script>
</body>
</html>
