<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Accès - Luxe & Éclat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style-auth.css">
</head>
<body>
    <div class="login-box">
        <h2 class="text-center mb-4">
            <a href="index.html" class="logo-link">💎 Luxe & Éclat</a>
        </h2>
        
        <form id="loginForm" style="display: block;">
            <h5 class="text-center text-warning mb-3">Connexion</h5>
            <div class="mb-3">
                <input type="text" id="loginEmail" class="form-control" placeholder="Identifiant (mohamedsoubhi)" required>
            </div>
            <div class="mb-3">
                <input type="password" id="loginPass" class="form-control" placeholder="Mot de passe" required>
            </div>
            <button type="submit" class="btn btn-gold">Se connecter</button>
            <p class="mt-3 text-center small">Pas de compte ? <span class="toggle-link" onclick="toggleForms()">S'inscrire</span></p>
        </form>

        <form id="registerForm" style="display: none;">
            <h5 class="text-center text-warning mb-3">Créer un compte</h5>
            <div class="mb-3"><input type="text" id="regName" class="form-control" placeholder="Nom complet" required></div>
            <div class="mb-3"><input type="email" id="regEmail" class="form-control" placeholder="Email" required></div>
            <div class="mb-3"><input type="password" id="regPass" class="form-control" placeholder="Mot de passe" required></div>
            <button type="submit" class="btn btn-gold">Valider l'inscription</button>
            <p class="mt-3 text-center small">Déjà inscrit ? <span class="toggle-link" onclick="toggleForms()">Se connecter</span></p>
        </form>

        <div class="text-center mt-4">
            <button onclick="forceReset()" class="btn-reset">
                <i class="fas fa-sync-alt"></i> Réinitialiser le système (Reset)
            </button>
        </div>
    </div>
    <script src="auth.js"></script>
</body>
</html>
